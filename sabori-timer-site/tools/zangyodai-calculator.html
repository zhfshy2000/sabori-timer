tring('ja-JP')}function calc(){const h=+hourly.value,o=+ot.value,r=+rate.value;const v=h*o*r;result.textContent=isFinite(v)?yen(v):'¥ --';detail.textContent=isFinite(v)?`${o}時間 × ${yen(h)} × 割増率 ${r} = ${yen(v)}`:''}hourly.oninput=ot.oninput=rate.onchange=calc;calc()</script><section class="w-full max-w-[728px] mx-auto flex flex-col items-center z-10"><span class="text-[10px] text-slate-500 tracking-widest mb-2 font-medium">スポンサーリンク</span><div class="w-full min-h-[50px] md:min-h-[90px] flex items-center justify-center border border-dashed border-slate-700/50 rounded-lg bg-slate-900/30"><span class="text-[10px] text-slate-600 font-mono">ADVERTISEMENT SPACE / BOTTOM</span></div></section>
